name: Gym DevOps CI Pipeline

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .  # ensures all commands run from repo root

    services:
      mongo:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Step 3: Install Python dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run Pytest
      - name: Run Tests
        run: |
          pytest

      # Step 5: Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 6: Build Docker image using the official action
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .              # repo root
          file: ./Dockerfile      # explicitly points to your Dockerfile
          push: false             # do not push to Docker Hub
          load: true              # critical! makes the image available on the runner
          tags: aceest-gym:latest